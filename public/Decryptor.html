<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Decryptor</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #020617, #0f172a);
}

.container {
  width: 90%;
  max-width: 400px;
  padding: 20px;
  border-radius: 20px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(12px);
  text-align: center;
  color: white;
  animation: fadeIn 1s ease;
}

h2 {
  margin-bottom: 15px;
}

textarea {
  width: 100%;
  height: 100px;
  border-radius: 10px;
  border: none;
  padding: 10px;
  margin-bottom: 15px;
  resize: none;
}

button {
  padding: 10px 15px;
  border: none;
  border-radius: 10px;
  background: #3b82f6;
  color: white;
  cursor: pointer;
  transition: 0.3s;
  margin: 5px;
}

button:hover {
  background: #2563eb;
}

.output {
  margin-top: 15px;
  background: #020617;
  padding: 10px;
  border-radius: 10px;
  word-break: break-all;
  font-size: 14px;
}

@keyframes fadeIn {
  from {opacity: 0; transform: translateY(20px);}
  to {opacity: 1;}
}
</style>
</head>

<body>

<div class="container">
  <h2>🔓 Decrypt Message</h2>

  <textarea id="encrypted" placeholder="Paste encrypted text..."></textarea>

  <button onclick="decrypt()">Decrypt</button>

  <div class="output" id="result"></div>
</div>

<script>
// SAME key (must match encryptor)
const SECRET = atob("c2VjcmV0X2xvdmVfMjAyNg==");

function decrypt() {
  let encrypted = document.getElementById("encrypted").value.trim();

  if (!encrypted) {
    alert("Paste encrypted text");
    return;
  }

  try {
    let bytes = CryptoJS.AES.decrypt(encrypted, SECRET);
    let original = bytes.toString(CryptoJS.enc.Utf8);

    if (!original) throw "error";

    document.getElementById("result").innerText = original;
  } catch {
    document.getElementById("result").innerText = "❌ Invalid or wrong message";
  }
}
</script>

</body>
</html>
